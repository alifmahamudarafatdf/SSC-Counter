<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Counter</title>
    <link rel="icon" type="image/x-icon" href="SSC.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text-dim: #444444;
            --text-bright: #7a7a7a;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* Force Landscape Animation like YT */
        .force-landscape {
            transform: rotate(90deg);
            transform-origin: center;
            width: 100vh;
            height: 100vw;
        }

        /* The Big Flip Numbers */
        .number-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 0.8;
            cursor: pointer;
            width: 100%;
        }

        .big-digit {
            font-size: clamp(6rem, 25vw, 20rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--text-bright);
            position: relative;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-align: center;
        }

        /* The Horizontal Split Line */
        .digit-split {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: clamp(2px, 0.5vw, 6px);
            background: var(--bg);
            z-index: 10;
            transform: translateY(-50%);
        }

        .label {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: clamp(0.8rem, 4vw, 1.5rem);
            letter-spacing: 0.2em;
            margin: 1.5rem 0;
            color: var(--text-dim);
            text-transform: uppercase;
            text-align: center;
        }

        /* Nav for Mode Switch */
        .mode-nav {
            position: fixed;
            top: 1.5rem;
            display: flex;
            gap: 1.5rem;
            z-index: 100;
        }

        .mode-btn {
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.3;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .mode-btn.active {
            opacity: 1;
            color: #fff;
        }

        /* Bottom Controls */
        .controls {
            position: fixed;
            bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            width: 100%;
        }

        .controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .ctrl-btn-group {
            display: flex;
            gap: 1rem;
        }

        .ctrl-btn {
            border: 1px solid #333;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
        }

        .ctrl-btn:active { background: #111; }

        /* Custom Time Input */
        #custom-time-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: #fff;
            width: 80px;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }

        /* Rotate Toggle Button */
        .rotate-trigger {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 101;
            opacity: 0.2;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .rotate-trigger:hover { opacity: 1; }

        /* Animation for number change */
        .change-anim {
            animation: flipEffect 0.4s ease-in-out;
        }

        @keyframes flipEffect {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(0.9); opacity: 0.7; }
            100% { transform: scaleY(1); }
        }

        /* Responsive Landscape (Real & Forced) */
        @media (orientation: landscape) {
            .big-digit { font-size: 45vh; }
            .label { margin: 0.5rem 0; font-size: 0.9rem; }
        }

        .force-landscape .big-digit {
            font-size: 45vw; 
        }
    </style>
</head>
<body id="body-main">

    <!-- Rotate Icon -->
    <div class="rotate-trigger" onclick="toggleRotation()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
    </div>

    <nav class="mode-nav">
        <div onclick="setMode('countdown')" id="m-countdown" class="mode-btn active">Countdown</div>
        <div onclick="setMode('stopwatch')" id="m-stopwatch" class="mode-btn">Stopwatch</div>
        <div onclick="setMode('timer')" id="m-timer" class="mode-btn">Timer</div>
    </nav>

    <div id="top-text" class="label">30/03/26</div>

    <div class="number-container" id="display-wrapper" onclick="handleDisplayClick()">
        <div class="digit-split"></div>
        <div id="main-num" class="big-digit">00</div>
    </div>

    <div id="bottom-text" class="label">MONDAY</div>

    <!-- Seconds / Milliseconds Display -->
    <div id="small-sec" style="position: fixed; bottom: 1.5rem; right: 1.5rem; font-size: 1.5rem; font-weight: 800; opacity: 0.15;">
        00
    </div>

    <div id="control-panel" class="controls">
        <div id="timer-setup" class="hidden flex flex-col items-center mb-2">
            <input type="number" id="custom-time-input" placeholder="MINS" min="1" max="999">
            <span class="text-[8px] uppercase tracking-[0.2em] opacity-30 mt-1">Study Minutes</span>
        </div>
        <div class="ctrl-btn-group">
            <button onclick="handleStart()" id="start-btn" class="ctrl-btn" style="background: #fff; color: #000; border: none;">Start</button>
            <button onclick="handleReset()" class="ctrl-btn">Reset</button>
        </div>
    </div>

    <script>
        let mode = 'countdown';
        let isForcedLandscape = false;
        const target = new Date("April 21, 2026 10:00:00").getTime();
        
        let swTime = 0, swInterval, swRunning = false;
        let tTime = 1500, tInterval, tRunning = false;

        const timeInput = document.getElementById('custom-time-input');
        const body = document.getElementById('body-main');

        function toggleRotation() {
            isForcedLandscape = !isForcedLandscape;
            body.classList.toggle('force-landscape', isForcedLandscape);
        }

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('active', btn.id === `m-${m}`));
            
            const ctrl = document.getElementById('control-panel');
            const timerSetup = document.getElementById('timer-setup');
            
            ctrl.classList.toggle('visible', m !== 'countdown');
            timerSetup.classList.toggle('hidden', m !== 'timer');
            
            clearInterval(swInterval);
            clearInterval(tInterval);
            swRunning = false;
            tRunning = false;
            document.getElementById('start-btn').innerText = 'Start';
            
            document.getElementById('display-wrapper').classList.add('change-anim');
            setTimeout(() => document.getElementById('display-wrapper').classList.remove('change-anim'), 400);
            
            update();
        }

        function handleDisplayClick() {
            if(mode === 'timer' && !tRunning) timeInput.focus();
        }

        timeInput.addEventListener('input', (e) => {
            if(mode === 'timer' && !tRunning) {
                const mins = parseInt(e.target.value);
                if(!isNaN(mins) && mins > 0) {
                    tTime = mins * 60;
                    update();
                }
            }
        });

        function update() {
            const main = document.getElementById('main-num');
            const top = document.getElementById('top-text');
            const bottom = document.getElementById('bottom-text');
            const small = document.getElementById('small-sec');

            if(mode === 'countdown') {
                const now = new Date().getTime();
                const d = target - now;
                if (d < 0) {
                    main.innerText = "GO";
                    bottom.innerText = "SSC 2026 STARTED";
                    return;
                }
                const days = Math.floor(d / (1000 * 60 * 60 * 24));
                const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((d % (1000 * 60)) / 1000);

                main.innerText = days.toString().padStart(2, '0');
                top.innerText = new Date().toLocaleDateString('en-GB');
                bottom.innerText = `${hours}H ${mins}M ${secs}S`;
                small.innerText = secs.toString().padStart(2, '0');
            } else if(mode === 'stopwatch') {
                const totalSecs = Math.floor(swTime / 100);
                const s = totalSecs % 60;
                const m = Math.floor(totalSecs / 60);
                const ms = swTime % 100;
                main.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                top.innerText = "STOPWATCH";
                bottom.innerText = "CHRONO MODE";
                small.innerText = ms.toString().padStart(2, '0'); // মিলি-সেকেন্ড
            } else if(mode === 'timer') {
                const m = Math.floor(tTime / 60);
                const s = tTime % 60;
                main.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                top.innerText = "FOCUS TIMER";
                bottom.innerText = "REMAINING";
                small.innerText = s.toString().padStart(2, '0');
            }
        }

        function handleStart() {
            const btn = document.getElementById('start-btn');
            if(mode === 'stopwatch') {
                swRunning = !swRunning;
                btn.innerText = swRunning ? 'Pause' : 'Start';
                if(swRunning) swInterval = setInterval(() => { swTime++; update(); }, 10);
                else clearInterval(swInterval);
            } else if(mode === 'timer') {
                tRunning = !tRunning;
                btn.innerText = tRunning ? 'Pause' : 'Start';
                if(tRunning) {
                    tInterval = setInterval(() => { 
                        if(tTime > 0) { tTime--; update(); } 
                        else { clearInterval(tInterval); tRunning = false; btn.innerText = 'Start'; }
                    }, 1000);
                } else {
                    clearInterval(tInterval);
                }
            }
        }

        function handleReset() {
            if(mode === 'stopwatch') { swTime = 0; swRunning = false; clearInterval(swInterval); }
            else if(mode === 'timer') { tTime = (parseInt(timeInput.value) || 25) * 60; tRunning = false; clearInterval(tInterval); }
            document.getElementById('start-btn').innerText = 'Start';
            update();
        }

        setInterval(() => { if(mode === 'countdown') update(); }, 1000);
        update();
    </script>
</body>
</html>
