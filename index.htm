<!DOCTYPE html> <html lang="bn"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>SSC-Counter</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet"> <style>:root{--bg:#000;--td:#444;--tb:#7a7a7a}body{background-color:var(--bg);color:var(--td);font-family:'JetBrains Mono',monospace;margin:0;height:100vh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:all .5s ease;-webkit-user-select:none;user-select:none}.force-landscape{transform:rotate(90deg);transform-origin:center;width:100vh;height:100vw}.number-container{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:.8;cursor:pointer;width:100%}.big-digit{font-size:clamp(6rem,25vw,20rem);font-weight:800;letter-spacing:-.05em;color:var(--tb);position:relative;transition:all .3s ease;white-space:nowrap;text-align:center}.digit-split{position:absolute;top:50%;left:0;width:100%;height:clamp(2px,.5vw,6px);background:var(--bg);z-index:10;transform:translateY(-50%)}.label{font-family:Inter,sans-serif;font-weight:900;font-size:clamp(.8rem,4vw,1.5rem);letter-spacing:.2em;margin:1.5rem 0;color:var(--td);text-transform:uppercase;text-align:center}.mode-nav{position:fixed;top:1.5rem;display:flex;gap:1.5rem;z-index:100}.mode-btn{font-size:.65rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase;opacity:.3;transition:all .3s ease;cursor:pointer}.mode-btn.active{opacity:1;color:#fff}.controls{position:fixed;bottom:2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;opacity:0;pointer-events:none;transition:opacity .3s ease;width:100%}.controls.visible{opacity:1;pointer-events:auto}.ctrl-btn-group{display:flex;gap:1rem}.ctrl-btn{border:1px solid #333;padding:.6rem 1.5rem;border-radius:4px;font-size:.75r
